name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn xgboost lightgbm scikit-learn \
            pandas numpy joblib requests flake8

      - name: Lint Python files
        run: |
          flake8 pages/ shared.py dashboard.py api.py \
            --max-line-length=120 \
            --ignore=E501,W503,E302,E303,W291,W293,E711,E712,W605 \
            --exclude=__pycache__

      - name: Start FastAPI server
        run: |
          uvicorn api:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Smoke test health endpoint
        run: |
          curl -f http://localhost:8000/health

      - name: Smoke test score endpoint
        run: |
          curl -f -X POST http://localhost:8000/score \
            -H "Content-Type: application/json" \
            -d '{
              "zones": [
                {
                  "operating_region": "J",
                  "temp_avg": 102,
                  "temp_min": 89,
                  "temp_max": 112
                }
              ]
            }'

      - name: Smoke test models endpoint
        run: |
          curl -f http://localhost:8000/models

  build-and-push:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/grid-reliability:latest .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/grid-reliability:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/grid-reliability:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/grid-reliability:${{ github.sha }}